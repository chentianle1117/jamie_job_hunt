# codex-config.example.toml
# Copy to ~/.codex/config.toml on Jamie's Mac and adjust the marked values.
# Docs: https://developers.openai.com/codex/config-reference  (note: mcp_servers with underscore)

# ─────────────────────────────────────────────────────────────────────────────
# MCP servers
# ─────────────────────────────────────────────────────────────────────────────

# CRITICAL — Gmail (draft/send), Google Drive, Google Sheets (the application tracker).
# First call triggers Google OAuth; sign in as jamiecheng0103@gmail.com and grant drive:full.
[mcp_servers.workspace-mcp]
command = "uvx"                       # match however workspace-mcp is launched on the machine
args = ["workspace-mcp", "--tools", "gmail", "drive", "calendar"]
env = { OAUTHLIB_INSECURE_TRANSPORT = "1", WORKSPACE_MCP_PORT = "8765" }

# OPTIONAL — Notion (legacy; live tracking is the Google Sheet, so usually not needed).
# [mcp_servers.notion]
# url = "https://mcp.notion.com/mcp"
# bearer_token_env_var = "NOTION_MCP_TOKEN"

# NOTE: there is NO Claude_in_Chrome MCP on Codex. Browser automation uses the repo's Patchright
# handlers (jamie-autopilot/lib/) headlessly; the Codex Chrome EXTENSION (installed in Chrome,
# not configured here) covers interactive logged-in browsing.

# ─────────────────────────────────────────────────────────────────────────────
# Permissions / sandbox
# ─────────────────────────────────────────────────────────────────────────────
sandbox_mode    = "workspace-write"   # edits in workspace + routine commands
approval_policy = "on-request"        # asks before stepping outside workspace/network (recommended for dogfood)

[sandbox_workspace_write]
network_access = true                 # REQUIRED: ATS APIs, JobSpy, Codex/Gemini CLI, git push, Patchright
writable_roots = [
  "/Users/jamiecheng/Agentic_Workflows_2026",   # <-- set to Jamie's actual repo parent
  "/private/tmp",                                 # temp files (ats_jobs.json, jobspy_results.json)
]

# Fat-context brain engine for the pipeline's gemini_run.py router.
# On Jamie's Mac use her own ChatGPT Plus (codex exec) — no API key, no Gemini dependency.
[shell_environment_policy.set]
AI_BRAIN = "codex"

# For fully-unattended overnight runs you CAN raise to approval_policy="never", but keep
# "on-request" for the first dogfood nights (matches the pipeline's phased-rollout plan).

# ─────────────────────────────────────────────────────────────────────────────
# Subagents (optional — Codex parallel agents, GA 2026; analog to Claude's Agent fan-out)
# ─────────────────────────────────────────────────────────────────────────────
# [agents]
# max_threads = 8
# For the deterministic discovery/verify fan-out, prefer Python concurrent.futures inside the
# scripts (zero model tokens) and reserve subagents for parallel drafting (tailor/cover/outreach).
