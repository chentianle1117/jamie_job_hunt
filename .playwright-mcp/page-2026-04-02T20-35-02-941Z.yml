                        - listitem [ref=e130]: "Physical Activity: Requires more than 2/3 of time sitting, and talking or hearing; 1/3 to 2/3 of time standing, walking, using hands/fingers to handle and/or feel and reaching with hands and arms; less than 1/3 of time climbing or balancing and stooping, kneeling, crouching or crawling."
                        - listitem [ref=e131]: "Lifting: Requires lifting up to 10 pounds less than 1/3 of time."
                        - listitem [ref=e132]: "Vision: Requires accurate close, distance and color vision, and the ability to focus."
                        - listitem [ref=e133]: "Environment: Requires more than 2/3 of time in an office setting with very limited exposure; less than 1/3 of time working in wet or humid conditions, extreme hot or cold, or outdoor weather conditions, exposed to fumes, airborne particles, toxic or caustic chemicals."
                        - listitem [ref=e134]: "Noise: Requires exposure to moderate noise conditions"
