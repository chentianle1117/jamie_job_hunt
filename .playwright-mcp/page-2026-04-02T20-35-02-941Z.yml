                  - heading "Talent Management Specialist II" [level=1] [ref=e65]
                  - generic [ref=e67]: Pittsburgh, PA, United States (Hybrid)
                - generic [ref=e75]:
                  - heading "Job Description" [level=2] [ref=e76]
                  - generic [ref=e77]:
                    - paragraph [ref=e78]: HWI has a fantastic opportunity to join our Talent Acquisition team as a Talent Management Specialist II. In this highly collaborative role, you will work closely with our business leaders to develop our internal talent through succession planning, talent development and analysis.
                    - generic [ref=e79]: The Talent Management Specialist II is responsible for implementing and continuously improving the global succession planning and talent development strategy. This role will ensure leadership continuity and maintain strong internal talent pipelines. This role partners closely with business leaders and HR stakeholders to identify high-potential employees, assess critical roles, develop future leaders, and develop and align talent initiatives with the organizational strategy.
                    - generic [ref=e80]:
                      - strong [ref=e82]: "Responsibilities:"
                      - generic [ref=e83]: Succession Planning and Talent Reviews
                      - generic [ref=e84]: Partner with global, local business leaders and HR to identify critical roles, assess talent risk and bench strengths across the organization and employee development initiatives
                      - list [ref=e86]:
                        - listitem [ref=e87]: Develop, maintain, and update succession plans, including readiness levels and development pathways, ensuring processes are fair, inclusive, and consistent
                        - listitem [ref=e88]: Facilitate talent reviews, succession planning including career path discussions, calibration sessions, and leadership discussions
                        - listitem [ref=e89]: Track succession coverage and bench strength metrics; identify gaps and recommend practical solutions
                        - listitem [ref=e90]: Coach leaders on talent identification, development, and succession best practices
                      - generic [ref=e91]: Talent Development
                      - list [ref=e93]:
                        - listitem [ref=e94]: Partner with Learning & Development to manage leadership development programs to align training with operational and future capability needs
                        - listitem [ref=e95]: Create and support Individual Development Plans (IDPs) for high-potential and critical-role talent
                        - listitem [ref=e96]: Promote internal mobility and career pathing initiatives
                      - generic [ref=e97]: Talent Assessment and Analytics
                      - list [ref=e99]:
                        - listitem [ref=e100]: Administer and interpret talent assessment tools (Harrison or other assessment)
                        - listitem [ref=e101]: Analyze talent and succession data to assess readiness, development progress, and pipeline health
                        - listitem [ref=e102]:
                          - paragraph [ref=e103]: Prepare clear, actionable dashboards, insights, and reports for HR and business leaders on a regular cadence
                          - paragraph [ref=e104]
                      - strong [ref=e106]: "Requirements:"
                    - list [ref=e109]:
                      - listitem [ref=e110]: The Talent Management Specialist II requires 4–7 years of experience in talent management, succession planning, or leadership development in a global organization
                      - listitem [ref=e111]: Bachelor’s degree in Human Resources, Organizational Development, Business, Psychology, or related field, Master’s degree and professional certification (e.g., SHRM, CIPD) preferred
                      - listitem [ref=e112]: Experience facilitating talent reviews and working with senior leaders
                      - listitem [ref=e113]: Proven experience designing and implementing development programs
                      - listitem [ref=e114]: Strong understanding of leadership competencies, talent assessment tools, and development methodologies.
                      - listitem [ref=e115]: Excellent facilitation, communication, and stakeholder management skills
                      - listitem [ref=e116]: Experience working in a rapidly changing, complex environment
                      - listitem [ref=e117]: Skill in establishing and maintaining effective working relationships with internal customers and Senior Management
                      - listitem [ref=e118]: Ability to effectively communicate and interact with all levels of personnel within the organization, including presenting information and responding to questions from groups of managers, clients, customers and the public
                      - listitem [ref=e119]: Ability to speak effectively before groups of customers or employees of the organization and to facilitate group discussions and serve as project lead as appropriate
                      - listitem [ref=e120]: Ability to plan own work, pay close attention to detail and handle multiple priorities
                      - listitem [ref=e121]: Ability to effectively market and promote the company in communities served
                      - listitem [ref=e122]: Proficient in Microsoft products including Excel, Word and PowerPoint
                      - listitem [ref=e123]: Oracle Cloud (or other HRIS system) knowledge
                      - listitem [ref=e124]: Lean and/or Six Sigma experience is a plus
                    - generic [ref=e125]:
