                - paragraph [ref=e70]:
                  - strong [ref=e71]: Program Manager - Medical Management - Remote
                - paragraph [ref=e72]: Under the direction of the Head of Providence Health Plan Payment Integrity (PI), the program manager of PI is responsible for the development, evaluation, coordination, implementation, and monitoring of all PI initiatives across the health plan. The PI manager oversees and drives all aspects and outcomes of PI through strategic matrixed relationships, ensuring initiatives have been appropriately communicated and prioritized across a wide range of stakeholders. Primary responsibilities include detailed tracking of initiatives with established data and expected ROI savings estimates, creation of manual and automated workflow pathways, plan policy development, and regulatory, contract, and benefit vetting. This role is responsible for setting and driving accountability through the Plan PI Committee, including identification and escalation of roadblocks.
                - paragraph [ref=e73]: Providence Health Plan caregivers are not simply valued – they’re invaluable. Join our team at Providence Health Plan Partners and thrive in our culture of patient-focused, whole-person care built on understanding, commitment, and mutual respect. Your voice matters here, because we know that to inspire and retain the best people, we must empower them.
