                  - strong [ref=e142]: About the Team
                - paragraph [ref=e143]: Providence Shared Services is a service line within Providence that provides a variety of functional and system support services for our family of organizations across Alaska, California, Montana, New Mexico, Oregon, Texas and Washington. We are focused on supporting our Mission by delivering a robust foundation of services and sharing of specialized expertise.
                - paragraph [ref=e144]:
