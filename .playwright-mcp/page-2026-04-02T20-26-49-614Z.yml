                  - text: Our
                  - link "best-in-class benefits" [ref=e132] [cursor=pointer]:
                    - /url: https://nam11.safelinks.protection.outlook.com/?url=https%3A%2F%2Fprovidence.jobs%2Fbenefits%2F&data=05%7C01%7Cethelleah.torres1%40providence.org%7C6da11282629946c936bc08dbf64b1e78%7C2e3190869a2646a3865f615bed576786%7C0%7C0%7C638374574718197112%7CUnknown%7CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%3D%7C3000%7C%7C%7C&sdata=CHUc7JRL0t6AAExYx6UfCEVEH8gfmaw9cEOZ4wX0%2BZU%3D&reserved=0
                  - text: are uniquely designed to support you and your family in staying well, growing professionally, and achieving financial security. We take care of you, so you can focus on delivering our
                  - link "Mission" [ref=e133] [cursor=pointer]:
                    - /url: https://providence.jobs/mission/
                  - text: of caring for everyone, especially the most vulnerable in our communities.
                - paragraph [ref=e134]: Accepting a new position at another facility that is part of the Providence family of organizations may change your current benefits. Changes in benefits, including paid time-off, happen for various reasons. These reasons can include changes of Legal Employer, FTE, Union, location, time-off plan policies, availability of health and welfare benefit plan offerings, and other various reasons.
                - paragraph [ref=e135]:
                  - strong [ref=e136]: About Providence
                - paragraph [ref=e137]: At Providence, our strength lies in Our Promise of “Know me, care for me, ease my way.” Working at our family of organizations means that regardless of your role, we’ll walk alongside you in your career, supporting you so you can support others. We provide best-in-class benefits and we foster an inclusive workplace where diversity is valued, and everyone is essential, heard and respected. Together, our 120,000 caregivers (all employees) serve in over 50 hospitals, over 1,000 clinics and a full range of health and social services across Alaska, California, Montana, New Mexico, Oregon, Texas and Washington. As a comprehensive health care organization, we are serving more people, advancing best practices and continuing our more than 100-year tradition of serving the poor and vulnerable.
                - paragraph [ref=e138]: Posted are the minimum and the maximum wage rates on the wage range for this position. The successful candidate's placement on the wage range for this position will be determined based upon relevant job experience and other applicable factors. These amounts are the base pay range; additional compensation may be available for this role, such as shift differentials, standby/on-call, overtime, premiums, extra shift incentives, or bonus opportunities.
                - paragraph [ref=e139]:
                  - text: Providence offers a comprehensive benefits package including a retirement 401(k) Savings Plan with employer matching, health care benefits (medical, dental, vision), life insurance, disability insurance, time off benefits (paid parental leave, vacations, holidays, health issues), voluntary benefits, well-being resources and much more. Learn more at
                  - link "providence.jobs/benefits" [ref=e140] [cursor=pointer]:
